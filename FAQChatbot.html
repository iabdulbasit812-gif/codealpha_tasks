<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FAQ Chatbot — CodeAlpha Task 2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f0e8;--surface:#fff;--dark:#1a1410;--accent:#c8440a;
  --accent2:#e8a020;--text:#2a2018;--muted:#8a7a6a;--border:#e0d8cc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Outfit',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--dark);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{width:38px;height:38px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-text h2{font-size:16px;font-weight:700;color:#f5f0e8}
.header-text p{font-size:11px;color:rgba(245,240,232,.4);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.badge-live{margin-left:auto;background:rgba(0,200,100,.12);border:1px solid rgba(0,200,100,.25);color:#00c864;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.badge-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#00c864;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.suggestions{padding:10px 16px;background:var(--dark);border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;overflow-x:auto;flex-shrink:0}
.suggestions::-webkit-scrollbar{display:none}
.sug-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(245,240,232,.7);font-family:'Outfit',sans-serif;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:88%;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--dark)}
.user .avatar{background:var(--accent)}
.bubble{padding:11px 15px;border-radius:12px;font-size:14px;line-height:1.6}
.bot .bubble{background:var(--surface);color:var(--text);border:1px solid var(--border);border-top-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.user .bubble{background:var(--accent);color:#fff;border-top-right-radius:4px}
.confidence{margin-top:7px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px}
.conf-bar{height:3px;border-radius:2px;background:var(--border);width:70px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px;background:var(--accent2)}
.typing-wrap{display:flex;gap:10px;align-self:flex-start}
.typing{padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;border-top-left-radius:4px;display:flex;gap:4px;align-items:center}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:t 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes t{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.input-area{padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0}
#userInput{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none}
#userInput:focus{border-color:var(--accent)}
#userInput::placeholder{color:var(--muted)}
.send-btn{width:42px;height:42px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;font-size:18px;flex-shrink:0}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.wm{text-align:center;font-size:10px;color:var(--muted);padding:6px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎓</div>
  <div class="header-text">
    <h2>StudyBot</h2>
    <p>University FAQ Assistant</p>
  </div>
  <div class="badge-live">Online</div>
</div>

<div class="suggestions">
  <button class="sug-btn" onclick="askSug(this)">How do I register for courses?</button>
  <button class="sug-btn" onclick="askSug(this)">What is GPA?</button>
  <button class="sug-btn" onclick="askSug(this)">How to apply for scholarship?</button>
  <button class="sug-btn" onclick="askSug(this)">What if I miss an exam?</button>
  <button class="sug-btn" onclick="askSug(this)">How do I pay school fees?</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')send()"/>
  <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
</div>
<div class="wm">CodeAlpha · Task 02 · FAQ Chatbot · Built by Dibbson</div>

<script>
const FAQS=[
  {q:"How do I register for courses?",a:"Log into your student portal, go to 'Course Registration', select your courses before the deadline, and confirm. Make sure you meet all prerequisites first."},
  {q:"What is GPA and how is it calculated?",a:"GPA (Grade Point Average) measures your academic performance. It's calculated by dividing total grade points by total credit hours. A=5, B=4, C=3, D=2, E=1, F=0 on a 5.0 scale (Nigerian system)."},
  {q:"How do I apply for a scholarship?",a:"Visit your university's financial aid office or student portal. Check eligibility, prepare your transcripts and personal statement, get recommendation letters, and submit before the deadline."},
  {q:"What happens if I miss an exam?",a:"Contact your lecturer immediately with a valid reason. You may qualify for a make-up exam with proper documentation (e.g. medical certificate). Unexcused absence usually means zero."},
  {q:"How do I defer a semester?",a:"Submit a deferral form to your academic department before the semester begins. Provide a valid reason. Approved deferral lets you resume next semester with no academic penalty."},
  {q:"How do I get my student ID card?",a:"Visit the student affairs office with your admission letter and passport photo. Some universities issue IDs automatically after online registration is complete."},
  {q:"Can I change my course of study?",a:"Yes, depending on your university's policy. Apply during the change-of-course window, meet requirements for the new course, and get approval from both departments."},
  {q:"What is a credit unit?",a:"A credit unit is the weight of a course. Heavier courses have more credit units and affect your GPA more. Most degrees require 120–180 total credit units to graduate."},
  {q:"How do I pay school fees?",a:"Pay through your student portal using bank transfer or online payment. Use your student ID as payment reference and keep your receipt for verification."},
  {q:"What is a carryover course?",a:"A carryover is a course you failed that you must repeat. You must register and pay for it again. You need to pass all carryovers to be eligible for graduation."},
  {q:"How do I get an official transcript?",a:"Request a transcript from the Examinations and Records office. Fill the form, pay the fee, and allow 1-2 weeks for processing. Some schools process this online."},
  {q:"What is the grading system in Nigeria?",a:"A (70-100) = 5pts, B (60-69) = 4pts, C (50-59) = 3pts, D (45-49) = 2pts, E (40-44) = 1pt, F (0-39) = 0pts. First Class = 4.50–5.00 CGPA."},
  {q:"What is CGPA?",a:"CGPA is your Cumulative GPA — your overall average across all semesters. GPA is per semester. CGPA is what appears on your degree certificate."},
  {q:"How do I access the library?",a:"Use your student ID to access the physical library. Most universities also offer a digital library through the student portal for online journals and textbooks."},
  {q:"What is the difference between degree and diploma?",a:"A degree (B.Sc, B.A) is a 3-4 year university programme. A diploma is a shorter 1-2 year certification course focused on practical skills, usually from polytechnics."},
];

const STOPWORDS=new Set(['the','a','an','is','are','was','be','i','me','my','you','your','we','do','does','did','what','how','when','where','and','or','but','if','in','on','at','to','for','of','with','by','from','about','can','will','it','its','this','that']);

function tokenize(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w=>w.length>1&&!STOPWORDS.has(w));}

function cosineSim(a,b){
  const fa={},fb={};
  tokenize(a).forEach(t=>{fa[t]=(fa[t]||0)+1;});
  tokenize(b).forEach(t=>{fb[t]=(fb[t]||0)+1;});
  const keys=new Set([...Object.keys(fa),...Object.keys(fb)]);
  let dot=0,mA=0,mB=0;
  keys.forEach(k=>{const va=fa[k]||0,vb=fb[k]||0;dot+=va*vb;mA+=va*va;mB+=vb*vb;});
  return mA&&mB?dot/(Math.sqrt(mA)*Math.sqrt(mB)):0;
}

function findMatch(q){
  let best=null,bestScore=0;
  FAQS.forEach(f=>{
    const s=cosineSim(q,f.q)*0.7+cosineSim(q,f.a)*0.3;
    if(s>bestScore){bestScore=s;best=f;}
  });
  return{faq:best,score:bestScore};
}

const chat=document.getElementById('chat');

function addMsg(text,role,score){
  const msg=document.createElement('div');
  msg.className='msg '+role;
  const av=document.createElement('div');
  av.className='avatar';
  av.textContent=role==='bot'?'🤖':'👤';
  const bub=document.createElement('div');
  bub.className='bubble';
  bub.textContent=text;
  if(role==='bot'&&score!==undefined){
    const pct=Math.min(Math.round(score*100),100);
    const conf=document.createElement('div');
    conf.className='confidence';
    conf.innerHTML=`<div class="conf-bar"><div class="conf-fill" style="width:${pct}%"></div></div>${pct}% match`;
    bub.appendChild(conf);
  }
  msg.appendChild(av);
  msg.appendChild(bub);
  chat.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  const d=document.createElement('div');
  d.className='typing-wrap';d.id='typ';
  d.innerHTML='<div class="avatar" style="background:#1a1410">🤖</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typ');if(t)t.remove();}

function send(){
  const inp=document.getElementById('userInput');
  const q=inp.value.trim();if(!q)return;
  inp.value='';
  document.getElementById('sendBtn').disabled=true;
  addMsg(q,'user');
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const{faq,score}=findMatch(q);
    if(!faq||score<0.05){
      addMsg("I'm not sure about that. Try asking about registration, GPA, scholarships, exams, or fees!",'bot',0);
    } else {
      addMsg(faq.a,'bot',score);
    }
    document.getElementById('sendBtn').disabled=false;
  },700);
}

function askSug(btn){document.getElementById('userInput').value=btn.textContent;send();}

window.onload=()=>{
  setTimeout(()=>addMsg("👋 Hi! I'm StudyBot. Ask me anything about university — registration, GPA, scholarships, exams, fees and more!",'bot'),400);
};
</script>
</body>
</html>
